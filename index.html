<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Hub - Discover Your Next Favorite Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🎌 Anime Hub</div>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search anime...">
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#popular">Popular</a></li>
                <li><a href="#genres">Genres</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>🎌 Welcome to Anime Hub</h1>
            <p>Discover the best anime series and movies</p>
            <p class="subtitle">Quality over Quantity - Premium Anime Collection</p>
        </div>
    </section>

    <section id="popular" class="popular">
        <div class="container">
            <h2>Popular Anime</h2>
            <div class="anime-grid" id="animeGrid">
                <!-- Anime cards will be populated here -->
            </div>
        </div>
    </section>

    <section id="genres" class="genres">
        <div class="container">
            <h2>Browse by Genre</h2>
            <div class="genre-list" id="genreList">
                <!-- Genre buttons will be populated here -->
            </div>
        </div>
    </section>

    <!-- Modal for Anime Details -->
    <div id="animeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody">
                <!-- Anime details will be populated here -->
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Anime Hub. All rights reserved. | Quality Anime Platform</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
